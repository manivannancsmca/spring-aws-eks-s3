name: CI - Docker and Security Only

on:
  push:
    branches: [ main ]

jobs:
  build-image:
    if: contains(github.event.head_commit.message, 'generate build')
    uses: manivannancsmca/spring-aws-eks-s3/.github/workflows/reusable-docker.yml@main
    with:
      docker-image-name: 's3-demo'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
