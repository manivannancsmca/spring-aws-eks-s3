name: CI - Docker and Security Only

on:
  push:
    branches: [ main ]

jobs:
  build-image:
    if: contains(github.event.head_commit.message, 'generate build')
    uses: manivannancsmca/spring-aws-eks-s3/.github/workflows/reusable-docker.yml@main
    with:
      docker-image-name: 's3-demo'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  deploy-to-eks:
    needs: build-image 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Deployment Spec Template
        run: |
          
          NEW_TAG="${{ needs.build-image.outputs.image-tag }}"
          echo "New deployment tag is: $NEW_TAG"
          
          sed -i "s/PLACEHOLDER/${NEW_TAG}/g" k8s/deployment.yaml
