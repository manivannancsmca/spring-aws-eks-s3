name: CI - Docker and Security Only

on:
  push:
    branches: [ main ]

jobs:
  # 1. Build the image first
  build-image:
    if: contains(github.event.head_commit.message, 'generate build')
    uses: manivannancsmca/spring-cicd-reusable-workflow/.github/workflows/reusable-docker.yml@main
    with:
      docker-image-name: 'spring-boot-api'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # 2. Scan it right after it completes successfully
  security-scan:
    needs: build-image # Wait for build to complete
    uses: manivannancsmca/spring-cicd-reusable-workflow/.github/workflows/reusable-trivy.yml@main
    with:
      docker-image-name: 'spring-boot-api'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
